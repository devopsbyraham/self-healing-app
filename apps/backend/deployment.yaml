apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: REPLACE_IMAGE
        ports:
        - containerPort: 3000
        resources:
          requests: {cpu: "250m", memory: "256Mi"}
          limits: {cpu: "500m", memory: "512Mi"}
        livenessProbe:
          httpGet: {path: /health, port: 3000}
        readinessProbe:
          httpGet: {path: /ready, port: 3000}
        startupProbe:
          httpGet: {path: /health, port: 3000}
          failureThreshold: 30
          periodSeconds: 10
