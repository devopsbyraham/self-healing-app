apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: production
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rb
  namespace: production
subjects:
- kind: ServiceAccount
  name: backend-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-role
